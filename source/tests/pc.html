<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>QBO Pricing Calculator</title>
  <style>
    table { border-collapse: collapse; width: 100%; margin-bottom: 1em; }
    th, td { padding: 0.5em; border: 1px solid #ccc; text-align: left; width: 100%; }
    select, input { width: auto; }
    tfoot td { font-weight: bold; }
    .export-btn, .discount-btn {
      padding: 10px 16px;
      border-radius: 5px;
      background: #4783ef;
      color: white;
      border: 0px;
      transition: background 0.2s ease-in-out;
      cursor: pointer;
    }
    .discount-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
    }
    .discount-controls span {
      min-width: 40px;
      display: inline-block;
    }
  </style>
</head>
<body>
  <h2>QBO Unit Pricing Calculator</h2>

  <table>
    <thead>
      <tr>
        <th>Customer Email</th>
        <th>Environment</th>
        <th>Discount</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td><input type="email" id="customer_email" placeholder="Enter email"></td>
        <td>
          <select id="env_select" onchange="toggleFields()">
            <option value="1">QBO Cloud</option>
            <option value="0.7" selected>Customer On-Prem</option>
          </select>
        </td>
        <td>
          <div class="discount-controls">
            <button class="discount-btn" onclick="changeDiscount(-5)">−</button>
            <span id="discount_display">0%</span>
            <button class="discount-btn" onclick="changeDiscount(5)">+</button>
          </div>
          <input type="hidden" id="discount_input" value="0">
        </td>
      </tr>
    </tbody>
  </table>

  <table>
    <thead>
      <tr>
        <th>Resource Type</th>
        <th>Quantity</th>
        <th>Hourly QBO Unit Rate</th>
        <th>Hourly QBO Units</th>
        <th>Monthly QBO Units</th>
      </tr>
    </thead>
    <tbody id="calc-body">
      <tr>
        <td>CPU Core</td>
        <td><input type="number" value="64" id="cpu_qty" readonly></td>
        <td>0.05</td>
        <td id="cpu_hourly"></td>
        <td id="cpu_units"></td>
      </tr>
      <tr>
        <td>GPU 
          <select id="gpu_model"></select>
        </td>
        <td><input type="number" value="1" id="gpu_qty"></td>
        <td id="gpu_rate"></td>
        <td id="gpu_hourly"></td>
        <td id="gpu_units"></td>
      </tr>
      <tr>
        <td>RAM (GB)</td>
        <td><input type="number" value="0" id="ram_qty"></td>
        <td>0.005</td>
        <td id="ram_hourly"></td>
        <td id="ram_units"></td>
      </tr>
      <tr>
        <td>Disk (GB)</td>
        <td><input type="number" value="0" id="disk_qty"></td>
        <td>0.0005</td>
        <td id="disk_hourly"></td>
        <td id="disk_units"></td>
      </tr>
      <tr>
        <td>Network (TB)</td>
        <td><input type="number" value="0" id="net_qty"></td>
        <td>0.25</td>
        <td id="net_hourly"></td>
        <td id="net_units"></td>
      </tr>
    </tbody>
    <tfoot>
      <tr>
        <td colspan="4">Total</td>
        <td id="total_units"></td>
      </tr>
    </tfoot>
  </table>

  <table>
    <thead>
      <tr>
        <th>QBO Unit</th>
        <th>USD</th>
      </tr>
    </thead>
    <tbody>
      <tr>
        <td>1</td>
        <td>1.00</td>
      </tr>
    </tbody>
  </table>

  <button class="export-btn" onclick="exportCSV()">Export CSV</button>

  <script>
    const gpuModels = {
      "GB300": 4.00,
      "GB200": 3.00,
      "A2000": 0.45,
      "A100 80GB": 2.50,
      "A100 40GB": 2.25,
      "H100": 3.50,
      "L40S": 2.00,
      "L4": 1.25,
      "RTX A6000": 1.75,
      "RTX 6000 Ada": 2.25,
      "RTX A5000": 1.50,
      "RTX 3090": 1.20,
      "RTX 3080": 1.00,
      "RTX 3070": 0.80,
      "T4": 0.60,
      "V100 32GB": 1.75,
      "V100 16GB": 1.50,
      "P100": 1.00,
      "P40": 0.75,
      "A2": 0.40,
      "K80": 0.20,
      "Jetson Nano": 0.08,
      "Jetson TX1": 0.10,
      "Jetson TX2": 0.12,
      "Jetson Xavier NX": 0.25,
      "Jetson AGX Xavier": 0.40,
      "Jetson Orin NX": 0.60,
      "Jetson Orin AGX": 0.80
    };

    const jetsonCpuCores = {
      "Jetson Nano": 4,
      "Jetson TX1": 4,
      "Jetson TX2": 6,
      "Jetson Xavier NX": 6,
      "Jetson AGX Xavier": 8,
      "Jetson Orin NX": 8,
      "Jetson Orin AGX": 12
    };

    const gpuSelect = document.getElementById('gpu_model');
    Object.keys(gpuModels).forEach(model => {
      const option = document.createElement('option');
      option.value = model;
      option.textContent = model;
      gpuSelect.appendChild(option);
    });
    gpuSelect.value = "A100 80GB";

    function toggleFields() {
      const isQboCloud = document.getElementById('env_select').value === "1";
      document.getElementById('ram_qty').disabled = !isQboCloud;
      document.getElementById('disk_qty').disabled = !isQboCloud;
      document.getElementById('net_qty').disabled = !isQboCloud;
    }

    function updateCpuField() {
      const selectedGpu = gpuSelect.value;
      const cpuField = document.getElementById('cpu_qty');
      if (selectedGpu in jetsonCpuCores) {
        cpuField.value = jetsonCpuCores[selectedGpu];
        cpuField.readOnly = true;
      } else {
        cpuField.readOnly = false;
      }
    }

    function calculate() {
      updateCpuField();

      const hoursPerMonth = 720;
      const envMultiplier = parseFloat(document.getElementById('env_select').value);
      const discountPercent = parseFloat(document.getElementById('discount_input').value) || 0;
      const discountMultiplier = (100 - discountPercent) / 100;
      const multiplier = envMultiplier * discountMultiplier;

      function compute(qty, rate) {
        return {
          hourly: qty * rate * multiplier,
          monthly: qty * rate * multiplier * hoursPerMonth
        };
      }

      const cpu = compute(parseFloat(document.getElementById('cpu_qty').value), 0.05);
      const gpu = compute(parseFloat(document.getElementById('gpu_qty').value), gpuModels[gpuSelect.value]);
      const ram = compute(parseFloat(document.getElementById('ram_qty').value), 0.005);
      const disk = compute(parseFloat(document.getElementById('disk_qty').value), 0.0005);
      const net = compute(parseFloat(document.getElementById('net_qty').value), 0.25);

      document.getElementById('cpu_hourly').textContent = cpu.hourly.toFixed(4);
      document.getElementById('cpu_units').textContent = cpu.monthly.toFixed(2);

      document.getElementById('gpu_rate').textContent = (gpuModels[gpuSelect.value] * multiplier).toFixed(2);
      document.getElementById('gpu_hourly').textContent = gpu.hourly.toFixed(4);
      document.getElementById('gpu_units').textContent = gpu.monthly.toFixed(2);

      document.getElementById('ram_hourly').textContent = ram.hourly.toFixed(4);
      document.getElementById('ram_units').textContent = ram.monthly.toFixed(2);

      document.getElementById('disk_hourly').textContent = disk.hourly.toFixed(4);
      document.getElementById('disk_units').textContent = disk.monthly.toFixed(2);

      document.getElementById('net_hourly').textContent = net.hourly.toFixed(4);
      document.getElementById('net_units').textContent = net.monthly.toFixed(2);

      const totalMonthly = cpu.monthly + gpu.monthly + ram.monthly + disk.monthly + net.monthly;
      document.getElementById('total_units').textContent = totalMonthly.toFixed(2);
      document.getElementById('discount_display').textContent = discountPercent + "%";
    }

    function changeDiscount(delta) {
      const input = document.getElementById('discount_input');
      let current = parseInt(input.value) || 0;
      current = Math.min(100, Math.max(0, current + delta));
      input.value = current;
      calculate();
    }

    function exportCSV() {
      const email = document.getElementById('customer_email').value || "Unnamed";
      const environment = document.getElementById('env_select').value === "1" ? "QBO Cloud" : "Customer On-Prem";
      const discount = document.getElementById('discount_input').value + "%";
      const rows = [
        ["Customer Email", email],
        ["Environment", environment],
        ["Discount Applied", discount]
      ];
      const table = document.querySelector("#calc-body");
      const headers = ["Resource Type", "Quantity", "Hourly QBO Unit Rate", "Hourly QBO Units", "Monthly QBO Units"];
      rows.push(headers);
      [...table.rows].forEach(row => {
        const cells = [...row.cells].map(cell => cell.innerText || cell.querySelector('input, select')?.value || '');
        rows.push(cells);
      });
      const total = document.getElementById('total_units').textContent;
      rows.push(["Total", "", "", "", total]);

      const csvContent = rows.map(r => r.join(",")).join("\n");
      const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.setAttribute("href", url);
      link.setAttribute("download", `${email.replace(/\s+/g, '_')}_QBO_Pricing.csv`);
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    }

    document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', calculate));
    toggleFields();
    calculate();
  </script>
</body>
</html>
