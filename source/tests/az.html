
<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>City Map (Dark Theme)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <style>
    body {
      background-color: #111;
      color: #eee;
      font-family: sans-serif;
      text-align: center;
    }
    h2 {
      margin: 20px 0;
    }
    #map {
      height: 600px;
      width: 100%;
      background-color: #000; /* ensure map div is black */
    }
    .leaflet-container {
      background: #000 !important; /* force map background black */
    }
  </style>
</head>
<body>
<h2>Availability Zones</h2>
<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  var map = L.map('map').setView([20, 0], 2);

  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap contributors & CartoDB',
    subdomains: 'abcd',
    maxZoom: 10
  }).addTo(map);

  L.marker([-34.6037, -58.3816]).addTo(map).bindPopup('Buenos Aires');
  L.marker([-33.8688, 151.2093]).addTo(map).bindPopup('Sydney');
  L.marker([-23.5505, -46.6333]).addTo(map).bindPopup('Sao Paulo');
  L.marker([-23.5505, -46.6333]).addTo(map).bindPopup('Sao Paulo 2');
  L.marker([50.1109, 8.6821]).addTo(map).bindPopup('Frankfurt');
  L.marker([35.6895, 139.6917]).addTo(map).bindPopup('Tokyo 3');
  L.marker([19.4326, -99.1332]).addTo(map).bindPopup('Mexico City 2');
  L.marker([52.3676, 4.9041]).addTo(map).bindPopup('Amsterdam');
  L.marker([1.3521, 103.8198]).addTo(map).bindPopup('Singapore');
  L.marker([51.5072, -0.1276]).addTo(map).bindPopup('London');
  L.marker([51.5072, -0.1276]).addTo(map).bindPopup('London 2');
  L.marker([39.0438, -77.4874]).addTo(map).bindPopup('Ashburn');
  L.marker([41.8781, -87.6298]).addTo(map).bindPopup('Chicago');
  L.marker([32.7767, -96.7970]).addTo(map).bindPopup('Dallas');
  L.marker([34.0522, -118.2437]).addTo(map).bindPopup('Los Angeles');
  L.marker([25.7617, -80.1918]).addTo(map).bindPopup('Miami 2');
</script>
</body>
</html>
